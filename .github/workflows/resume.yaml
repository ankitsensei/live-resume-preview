name: Update Resume

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-resume:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download PDF
      run: |
        url="https://www.overleaf.com/download/project/66a8da01648a5fc8f0cfc6ce/build/19e94c9d876-58e7a2ab7f3ccbbc/output/output.pdf?compileGroup=standard&clsiserverid=clsi-pre-emp-c3-c-f-zknf"
        output_file="latest.pdf"
        cookie="overleaf_session2=s:j2PoCTdU-VfMtXK4v5HTojBr2MwI47-L.E+YV+nnp5dU6b6jKU0zFyjk8pdpjAg/P/Hzj4ngd5bI"

        # Attempt to download the PDF
        if ! curl -L -H 'Cookie: $cookie' -o $output_file $url; then
          echo "Failed to download the PDF from $url"
          exit 1
        fi

        mv latest.pdf files/jatin-resume.pdf

    - name: Create Pull Request
      id: cpr
      uses: peter-evans/create-pull-request@v6
      with:
        commit-message: "chore: update resume"
        committer: Jatin <heyjatinn@gmail.com>
        author: Jatin <heyjatinn@gmail.com>
        branch: chore/update-resume
        base: main
        delete-branch: true
        title: 'chore: update resume'
        body: |
          Update resume from Overleaf.

          This PR is automatically generated by a GitHub Action.
        labels: |
          enhancement
          update-resume
        reviewers: jatindotdev
